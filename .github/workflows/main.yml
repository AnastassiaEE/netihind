name: Deploy to Zone.ee Server

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to server with rsync
        run: |
          rsync -avz --delete ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Restart pm2 on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'EOF'
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          cat > .env << EOL
          APP_NAME="${{ vars.APP_NAME }}"
          APP_HOST="${{ vars.APP_HOST }}"
          APP_PORT="${{ vars.APP_PORT }}"
          NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_WORDPRESS_API_ENDPOINT="${{ vars.NEXT_PUBLIC_WORDPRESS_API_ENDPOINT }}"
          WORDPRESS_AUTH_REFRESH_TOKEN="${{ vars.WORDPRESS_AUTH_REFRESH_TOKEN }}"
          RESEND_API_KEY="${{ vars.RESEND_API_KEY }}"
          EOL

          npm ci
          rm -rf .next
          npm run build

          pm2 delete ecosystem.config.js || true
          pm2 start ecosystem.config.js --max-memory-restart 200M
          pm2 save
          EOF
