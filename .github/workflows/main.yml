name: Deploy to Zone.ee Server

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "Deploying Supabase migrations for branch: ${{ github.ref_name }}"
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to server with rsync
        run: |
          rsync -avz --delete ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Restart pm2 on server
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << EOF
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          echo "Deploying branch: $GITHUB_REF_NAME"

          cat > .env << EOL
          NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_WORDPRESS_API_ENDPOINT="${{ vars.NEXT_PUBLIC_WORDPRESS_API_ENDPOINT }}"
          WORDPRESS_AUTH_REFRESH_TOKEN="${{ secrets.WORDPRESS_AUTH_REFRESH_TOKEN }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          EOL

          npm ci
          rm -rf .next
          npm run build

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "This is the main branch, restarting production pm2 process"
            pm2 delete netihind || true
            pm2 start /data03/virt133092/domeenid/www.netihind.ee/ecosystems/ecosystem-prod.config.js
          else
            echo "This is not main branch, restarting test pm2 process"
            pm2 delete netihind-test || true
            pm2 start /data03/virt133092/domeenid/www.netihind.ee/ecosystems/ecosystem-dev.config.js
          fi

          pm2 save
          EOF
