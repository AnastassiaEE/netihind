name: Deploy to Zone.ee Server

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package-lock changes
        id: lockfile
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -qx "package-lock.json"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------
      # Setup Supabase CLI (needed for migrations)
      # -----------------------------
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # -----------------------------
      # Setup SSH for rsync and remote commands
      # -----------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------
      # Rsync files to server (excluding node_modules, .next, .git, .github, .maintenance.html)
      # -----------------------------
      - name: Copy files to server with rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='maintenance.html' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      # -----------------------------
      # Prepare robots + .env files on server based on branch
      # -----------------------------
      - name: Prepare files (robots.txt + .env)
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << EOF
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          echo "Starting robots.txt copy for branch: $GITHUB_REF_NAME"

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-prod.txt public/robots.txt
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-prod.txt public/ru/robots.txt
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-prod.txt public/et/robots.txt
          elif [ "$GITHUB_REF_NAME" = "dev" ]; then
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-dev.txt public/robots.txt
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-dev.txt public/ru/robots.txt
            cp /data03/virt133092/domeenid/www.netihind.ee/seo/robots-dev.txt public/et/robots.txt
          fi

          echo "Writing .env file..."

          cat > .env << EOL
          NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_WORDPRESS_API_ENDPOINT="${{ vars.NEXT_PUBLIC_WORDPRESS_API_ENDPOINT }}"
          WORDPRESS_AUTH_REFRESH_TOKEN="${{ secrets.WORDPRESS_AUTH_REFRESH_TOKEN }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          EOL

          EOF

      # -----------------------------
      # Build on server and install dependencies
      # -----------------------------
      - name: Build project on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'EOF'
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          FULL_CI_EVERY=10

          echo "Stopping existing pm2 processes..."
          if [ "${{ github.ref_name }}" = "main" ]; then
          pm2 stop netihind || true
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            pm2 stop netihind-test || true
          else
            echo "Branch is not main or dev — skipping pm2 stop"
          fi

          echo "Cleaning old build artifacts (preserving cache)..."
          rm -rf .next

          DEPLOY_COUNTER_FILE=".deploy_counter"
          DEPLOY_COUNT=0
          if [ -f "$DEPLOY_COUNTER_FILE" ]; then
            DEPLOY_COUNT=$(cat "$DEPLOY_COUNTER_FILE")
          fi

          RUN_FULL_CI=false
          if [ "${{ steps.lockfile.outputs.changed }}" = "true" ]; then
            RUN_FULL_CI=true
            echo "package-lock.json changed -> running full clean install"
          else
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            if [ "$DEPLOY_COUNT" -ge "$FULL_CI_EVERY" ]; then
              RUN_FULL_CI=true
              DEPLOY_COUNT=0
              echo "Reached $FULL_CI_EVERY deploys -> running periodic full clean install"
            fi
          fi

          echo "$DEPLOY_COUNT" > "$DEPLOY_COUNTER_FILE"

          echo "Installing dependencies..."
          if [ "$RUN_FULL_CI" = "true" ]; then
            rm -rf node_modules
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund --prefer-offline
          fi

          echo "Building project..."
          npm run build

          EOF

      # -----------------------------
      # Supabase migrations
      # -----------------------------
      - name: Deploy Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "Deploying Supabase migrations for branch: ${{ github.ref_name }}"
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push

      # -----------------------------
      # Restart pm2 processes based on branch
      # -----------------------------
      - name: Restart pm2 on server
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << EOF
          set -e

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "Restarting production pm2 process"
            pm2 delete netihind || true
            pm2 start /data03/virt133092/domeenid/www.netihind.ee/ecosystems/ecosystem-prod.config.js
          else
            echo "Restarting dev pm2 process"
            pm2 delete netihind-test || true
            pm2 start /data03/virt133092/domeenid/www.netihind.ee/ecosystems/ecosystem-dev.config.js
          fi

          pm2 save
          EOF
