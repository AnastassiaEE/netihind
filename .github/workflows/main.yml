name: Deploy to Zone.ee Server

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy files to server with rsync
        run: |
          rsync -avz --delete ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Restart pm2 on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            export APP_NAME="${{ vars.APP_NAME }}"
            export APP_HOST="${{ vars.APP_HOST }}"
            export APP_PORT="${{ vars.APP_PORT }}"
            export NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}"
            export NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            export NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
            export NEXT_PUBLIC_WORDPRESS_API_ENDPOINT="${{ vars.NEXT_PUBLIC_WORDPRESS_API_ENDPOINT }}"
            export WORDPRESS_AUTH_REFRESH_TOKEN="${{ vars.WORDPRESS_AUTH_REFRESH_TOKEN }}"
            export RESEND_API_KEY="${{ vars.RESEND_API_KEY }}"
           
            echo "RESEND_API_KEY=$RESEND_API_KEY"

            npm ci
            rm -rf .next
            npm run build
            pm2 restart ecosystem.config.js --max-memory-restart 200M
          EOF
